Reservation Lookup Prototype
Prototype page allowing users to search for reservation information.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation Lookup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <a href="index.html">Home</a>
        <a href="lookup.html">Reservation Lookup</a>
    </nav>

    <h1>Reservation Lookup</h1>

    <!-- Search Form -->
    <form>
        <label>Reservation ID:</label><br>
        <input type="text"><br><br>

        <p>OR</p>

        <label>Email Address:</label><br>
        <input type="email"><br><br>

        <button type="submit">Search</button>
    </form>

    <hr>

    <!-- Example Results -->
    <h2>Reservation Results</h2>

    <p><strong>Reservation ID:</strong> 1001</p>
    <p><strong>Room Type:</strong> Queen</p>
    <p><strong>Guests:</strong> 2</p>
    <p><strong>Check-In:</strong> July 15, 2026</p>
    <p><strong>Check-Out:</strong> July 18, 2026</p>

</body>
</html>
