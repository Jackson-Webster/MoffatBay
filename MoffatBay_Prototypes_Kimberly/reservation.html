<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account</title>
    <link rel="stylesheet" href="reservation.css">
</head>
<body>
    <h1>Book Your Stay!</h1>

    <p>
        Fill out the form below to reserve your room.
    </p>

    <!-- Da form -->
    <form>

        <!-- Room Size -->
        <label>Room Size:</label><br>
        <select>
            <option>Select a Room</option>
            <option>Double Full Beds: $67 per night</option>
            <option>Queen: $101 per night</option>
            <option>Double Queen Beds: $140 per night</option>
            <option>King: $160 per night</option>
        </select>

        <br><br>

        <!-- How many guests?!?! -->
        <label>Number of Guests:</label><br>
        <input type="number">

        <br><br>

        <label>Check-In Date:</label><br>
        <input type="date">

        <br><br>

        <label>Check-Out Date:</label><br>
        <input type="date">

        <br><br>

        <!-- Fake button will add one later U_U -->
        <button type="submit">Continue</button>

    </form>

    <!-- THIS IS WHERE THE RESERVATION SUMMARY SHOULD BE CONNECTED!!! :D -->
     <!-- yooo also the summary should definitely have the back to home button-->

     <!-- Will there be a user tab where it says to view their reservations? or smth like that? -->

</body>
</html>
